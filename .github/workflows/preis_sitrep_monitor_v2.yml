name: PREIS Ebola DRC SitRep Monitor

on:
  schedule:
    - cron: "*/30 * * * *"   # toutes les 30 min (INSP lent : pas la peine d'aller plus vite)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: preis-sitrep-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
      ALERT_FROM: ${{ secrets.ALERT_FROM }}
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: "587"
      PREIS_DRY_RUN: "false"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true   # binaires précompilés = installation rapide

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev libssl-dev libxml2-dev \
            libfontconfig1-dev libfreetype6-dev libpng-dev \
            libtiff5-dev libjpeg-dev \
            libgdal-dev libgeos-dev libproj-dev libudunits2-dev \
            libpoppler-cpp-dev poppler-utils

      - name: Install R packages
        run: |
          Rscript -e 'pkgs <- c("blastula","readr","rvest","xml2","httr","httr2","stringr","dplyr","tibble","purrr","openssl","tidyr","ggplot2","lubridate","sf","scales","zoo","pdftools","openxlsx","readxl","glue","jsonlite","base64enc","ggrepel"); miss <- pkgs[!vapply(pkgs, requireNamespace, logical(1), quietly = TRUE)]; if (length(miss)) install.packages(miss, repos = "https://packagemanager.posit.co/cran/__linux__/jammy/latest")'

      - name: Run SitRep monitor (full chain)
        run: |
          Rscript scripts/08_cloud_sitrep_monitor.R

      - name: Commit monitor state + outputs if updated
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/monitor_state/preis_sitrep_email_state.csv data/pdf/ data/final/ data/curated/ outputs/analyse/ dashboard_ebola/data/ logs/ || true
          if git diff --cached --quiet; then
            echo "No state change to commit."
          else
            git commit -m "Update PREIS SitRep monitor state + analysis outputs [skip ci]"
            git push
          fi
