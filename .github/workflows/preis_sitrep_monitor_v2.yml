name: PREIS Ebola DRC SitRep Monitor

on:
  schedule:
    - cron: "*/30 * * * *"   # toutes les 30 min (INSP lent : pas la peine d'aller plus vite)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: preis-sitrep-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
      ALERT_FROM: ${{ secrets.ALERT_FROM }}
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: "587"
      PREIS_DRY_RUN: "false"
      # Lien du tableau de bord (auto-frais, compte zrhyacinthe25),
      # affiche dans les emails d'alerte.
      PREIS_DASHBOARD_URL: "https://zrhyacinthe25.shinyapps.io/preis-ebola-drc-v2/"
      # Mode test de l'alerte : "false" en production.
      PREIS_TEST_ALERT: "true"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # IMPORTANT : on se synchronise sur le distant AVANT de lancer le pipeline,
      # pour que les fichiers d'etat (sent_log, monitor_state) lus par les scripts
      # soient deja la version la plus recente du depot. Ainsi l'anti-doublon
      # voit ce qui a deja ete envoye.
      - name: Sync with remote (pull latest state)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main || true

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev libssl-dev libxml2-dev \
            libfontconfig1-dev libfreetype6-dev libpng-dev \
            libtiff5-dev libjpeg-dev \
            libgdal-dev libgeos-dev libproj-dev libudunits2-dev \
            libpoppler-cpp-dev poppler-utils

      - name: Install R packages
        run: |
          Rscript -e 'pkgs <- c("blastula","readr","rvest","xml2","httr","httr2","stringr","dplyr","tibble","purrr","openssl","tidyr","ggplot2","lubridate","sf","scales","zoo","pdftools","openxlsx","readxl","glue","jsonlite","base64enc","ggrepel"); miss <- pkgs[!vapply(pkgs, requireNamespace, logical(1), quietly = TRUE)]; if (length(miss)) install.packages(miss, repos = "https://packagemanager.posit.co/cran/__linux__/jammy/latest")'

      - name: Run SitRep monitor (full chain)
        run: |
          Rscript scripts/08_cloud_sitrep_monitor.R

      # On commit ET push les fichiers d'etat + donnees. CLE : on commit
      # AVANT tout pull/rebase, et on retente proprement en cas de rejet.
      # Le sent_log_sitrep.csv (anti-doublon de l'alerte) est inclus
      # explicitement pour garantir qu'il est persiste.
      - name: Commit state + outputs (persist sent_log & data)
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          echo "=== Fichiers d'etat APRES le run ==="
          for f in data/monitor_state/preis_sitrep_email_state.csv data/final/sent_log_sitrep.csv; do
            if [ -f "$f" ]; then echo "--- $f ---"; cat "$f"; else echo "ABSENT: $f"; fi
          done

          echo "=== git status (avant add) ==="
          git status --short

          # Nettoyage defensif : un script peut creer par erreur un dossier
          # a chemin Windows absolu (ex: 'D:/') dans le runner Linux, ce qui
          # fait echouer un 'git add' global. On l'ignore explicitement.
          rm -rf "D:" "D:/" 2>/dev/null || true

          # Ajout EXPLICITE et individuel des fichiers a persister. Chaque
          # 'git add' est independant : l'echec de l'un ne bloque pas les
          # autres. On cible les fichiers cles par chemin precis (la serie
          # du dashboard et l'anti-doublon en tete).
          for f in \
            outputs/analyse/serie_temporelle_nationale.csv \
            outputs/analyse/tableau_zones_sante.csv \
            data/final/sent_log_sitrep.csv \
            data/monitor_state/preis_sitrep_email_state.csv \
            data/final/PREIS_indicators_long.csv \
            data/final/PREIS_daily_indicators.csv \
            data/final/PREIS_signals.csv \
            data/final/PREIS_signals_text.txt \
            data/final/INRB_reference_national.csv \
            data/final/PREIS_validation_signals.csv ; do
            if [ -f "$f" ]; then git add -f "$f" || echo "add skip: $f"; fi
          done

          # Ajout des dossiers de sortie volumineux (graphiques, validation,
          # copies dashboard) : tolerant, ne bloque jamais le commit.
          git add outputs/analyse/ outputs/validation/ dashboard_ebola/data/ 2>/dev/null || true

          echo "=== git status (apres add, staged) ==="
          git diff --cached --name-only

          if git diff --cached --quiet; then
            echo "Aucun changement a committer."
          else
            git commit -m "Update PREIS state + outputs (serie, sent_log, data) [skip ci]"
            pushed=0
            for attempt in 1 2 3; do
              # rebase APRES commit : nos changements sont deja captures dans
              # le commit local, le rebase ne peut donc pas les ecraser.
              git pull --rebase --autostash origin main || true
              if git push; then
                echo "PUSH REUSSI (tentative $attempt)"
                pushed=1
                break
              else
                echo "Push rejete (tentative $attempt), nouvelle tentative..."
                sleep 3
              fi
            done
            if [ "$pushed" -ne 1 ]; then
              echo "ECHEC DU PUSH apres 3 tentatives"
            fi
          fi
