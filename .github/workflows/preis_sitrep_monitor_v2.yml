name: PREIS Ebola DRC SitRep Monitor V2

run-name: PREIS SitRep Monitor V2 - ${{ github.event_name }} - run #${{ github.run_number }}

on:
  workflow_dispatch:
  schedule:
    - cron: "7,37 * * * *"

permissions:
  contents: write

concurrency:
  group: preis-sitrep-monitor-v2
  cancel-in-progress: false

jobs:
  monitor:
    name: Run PREIS SitRep monitor V2
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show GitHub trigger information
        run: |
          echo "Event name: ${{ github.event_name }}"
          echo "Repository: $GITHUB_REPOSITORY"
          echo "Ref: $GITHUB_REF"
          echo "Branch: $GITHUB_REF_NAME"
          echo "Run number: $GITHUB_RUN_NUMBER"
          echo "Run attempt: $GITHUB_RUN_ATTEMPT"
          echo "UTC time: $(date -u)"
          echo "Local runner time: $(date)"

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
          use-public-rspm: true

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libuv1-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libpng-dev \
            libtiff5-dev \
            libjpeg-dev

      - name: Show R and system environment
        run: |
          R --version
          curl --version
          pkg-config --version || true

      - name: Run SitRep monitor
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
          RECIPIENT_EMAILS: ${{ secrets.RECIPIENT_EMAILS }}
        run: |
          Rscript scripts/08_cloud_sitrep_monitor.R

      - name: Commit updated monitor state if changed
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git status

          git add .

          if git diff --cached --quiet; then
            echo "No monitor state change to commit."
          else
            git commit -m "Update PREIS SitRep monitor state"
            git push
          fi
