name: PREIS Ebola DRC SitRep Monitor V2

on:
  workflow_dispatch:
  repository_dispatch:
    types: [preis_sitrep_monitor]
  schedule:
    - cron: '*/5 * * * *'
  push:
    branches: [main]
    paths:
      - 'scripts/08_cloud_sitrep_monitor.R'
      - 'scripts/00_email_smtp_base.R'
      - '.github/workflows/preis_sitrep_monitor_v2.yml'

permissions:
  contents: write

concurrency:
  group: preis-sitrep-monitor-v2
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      PREIS_DRY_RUN: 'FALSE'
      PREIS_MAX_PAGES: '6'
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      ALERT_FROM: ${{ secrets.ALERT_FROM }}
      ALERT_TO: ${{ secrets.ALERT_TO }}
      ALERT_CC: ${{ secrets.ALERT_CC }}
      ALERT_BCC: ${{ secrets.ALERT_BCC }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            make

      - name: Install R packages
        run: |
          Rscript --vanilla -e 'install.packages(c("httr","rvest","xml2","stringr","dplyr","readr","tibble","purrr","digest","curl","base64enc","emayili"), repos="https://cloud.r-project.org")'

      - name: Check email secrets
        run: |
          Rscript --vanilla -e 'required <- c("SMTP_USER","SMTP_PASS","ALERT_FROM","ALERT_TO"); missing <- required[!nzchar(Sys.getenv(required))]; if (length(missing) > 0) stop("Secrets manquants: ", paste(missing, collapse=", ")); cat("Email secrets OK\n")'

      - name: Parse R scripts
        run: |
          Rscript --vanilla -e 'parse(file="scripts/00_email_smtp_base.R", encoding="UTF-8"); parse(file="scripts/08_cloud_sitrep_monitor.R", encoding="UTF-8"); cat("R parse OK\n")'

      - name: Run PREIS SitRep monitor
        run: |
          Rscript --vanilla scripts/08_cloud_sitrep_monitor.R

      - name: Commit monitor outputs
        run: |
          git config user.name "PREIS Ebola Automation"
          git config user.email "actions@github.com"
          git add data/monitor_state/ data/pdf/ data/logs/ outputs/cloud_monitor/ || true
          git status --short
          git commit -m "PREIS SitRep monitor state update" || echo "No changes to commit"
          git pull --rebase origin main || echo "No remote changes to rebase"
          git push || echo "No changes to push"
