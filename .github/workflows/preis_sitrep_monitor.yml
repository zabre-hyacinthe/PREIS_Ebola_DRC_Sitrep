name: PREIS Ebola DRC SitRep Monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: preis-sitrep-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
      ALERT_FROM: ${{ secrets.ALERT_FROM }}
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: "465"
      PREIS_DRY_RUN: "false"
      R_LIBS_USER: ${{ github.workspace }}/.R/library

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Setup Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Create R library folder
        run: |
          mkdir -p "$R_LIBS_USER"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libuv1-dev \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            cmake \
            make

      - name: Install R packages
        run: |
          Rscript -e 'options(repos = c(CRAN = "https://cloud.r-project.org")); packages <- c("fs", "blastula", "readr", "rvest", "xml2", "httr2", "stringr", "dplyr", "tibble", "purrr", "openssl"); missing <- packages[!vapply(packages, requireNamespace, logical(1), quietly = TRUE)]; if (length(missing) > 0) install.packages(missing, dependencies = TRUE)'

      - name: Verify R packages
        run: |
          Rscript -e 'packages <- c("fs", "blastula", "readr", "rvest", "xml2", "httr2", "stringr", "dplyr", "tibble", "purrr", "openssl"); failed <- packages[!vapply(packages, requireNamespace, logical(1), quietly = TRUE)]; if (length(failed) > 0) stop("Missing packages: ", paste(failed, collapse = ", ")); cat("All required R packages are available.\n")'

      - name: Run SitRep monitor
        run: |
          Rscript scripts/08_cloud_sitrep_monitor.R

      - name: Commit monitor state if updated
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/monitor_state/preis_sitrep_email_state.csv || true
          git add data/pdf/ || true

          if git diff --cached --quiet; then
            echo "No state change to commit."
          else
            git commit -m "Update PREIS SitRep monitor state [skip ci]"
            git pull --rebase
            git push
          fi
