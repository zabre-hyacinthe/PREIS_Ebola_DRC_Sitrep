name: PREIS Ebola DRC SitRep Monitor
on:
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: preis-sitrep-monitor
  cancel-in-progress: false
jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
      ALERT_FROM: ${{ secrets.ALERT_FROM }}
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: "465"
      PREIS_DRY_RUN: "false"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev libfontconfig1-dev libuv1-dev libgit2-dev libharfbuzz-dev libfribidi-dev libfreetype6-dev libpng-dev libtiff5-dev libjpeg-dev

      - name: Install R packages
        run: |
          Rscript -e 'options(repos = c(P3M = "https://packagemanager.posit.co/cran/__linux__/jammy/latest", CRAN = "https://cloud.r-project.org")); packages <- c("blastula","readr","rvest","xml2","httr2","stringr","dplyr","tibble","purrr","openssl","openxlsx","tidyr","lubridate","jsonlite","pdftools"); missing <- packages[!vapply(packages, requireNamespace, logical(1), quietly = TRUE)]; if (length(missing) > 0) install.packages(missing)'

      - name: Run SitRep monitor (detection + extraction + email)
        run: |
          Rscript scripts/08_cloud_sitrep_monitor.R

      - name: Generate QC indicators table (Excel)
        if: always()
        run: |
          Rscript -e 'tryCatch(source("scripts/92_qc_tableau_indicateurs.R"), error=function(e) cat("QC table skipped:", conditionMessage(e), "\n"))'

      - name: Commit updated state, data and QC table
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/monitor_state/preis_sitrep_email_state.csv data/pdf/ data/final/ outputs/audit/ || true
          if git diff --cached --quiet; then
            echo "No change to commit."
          else
            git commit -m "Update PREIS state + indicators + QC table [skip ci]"
            git push
          fi
