name: PREIS Ebola DRC SitRep Monitor

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: preis-sitrep-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
      EMAIL_FROM: ${{ secrets.ALERT_FROM }}
      EMAIL_TO: ${{ secrets.ALERT_TO }}
      EMAIL_CC: ${{ secrets.ALERT_CC }}
      EMAIL_BCC: ${{ secrets.ALERT_BCC }}
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: "465"
      PREIS_DRY_RUN: "false"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Show current commit and monitor script
        run: |
          echo "Current branch:"
          git branch --show-current

          echo "Current commit:"
          git rev-parse HEAD

          echo "Monitor script:"
          ls -lah scripts/08_cloud_sitrep_monitor.R

          echo "First 40 lines:"
          sed -n '1,40p' scripts/08_cloud_sitrep_monitor.R

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Run SitRep monitor
        run: |
          Rscript --vanilla scripts/08_cloud_sitrep_monitor.R

      - name: Commit monitor state and downloaded files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/state/ || true
          git add data/incoming/insp_sitreps/ || true
          git add outputs/cloud_monitor/ || true

          if git diff --cached --quiet; then
            echo "No state change to commit."
          else
            git commit -m "Update PREIS SitRep monitor state [skip ci]"
            git pull --rebase origin main || true
            git push origin HEAD:main
          fi
