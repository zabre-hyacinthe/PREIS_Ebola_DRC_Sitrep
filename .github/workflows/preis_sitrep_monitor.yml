name: PREIS Ebola DRC SitRep Monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: preis-sitrep-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
      ALERT_FROM: ${{ secrets.ALERT_FROM }}
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: "465"
      PREIS_DRY_RUN: "false"
      USE_BUNDLED_LIBUV: "1"
      R_REMOTES_NO_ERRORS_FROM_WARNINGS: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Setup Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libuv1-dev \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libpng-dev \
            libjpeg-dev \
            libtiff5-dev \
            cmake \
            make

          echo "Checking libuv installation..."
          pkg-config --cflags --libs libuv || true
          find /usr -name "uv.h" 2>/dev/null || true

      - name: Install R packages
        run: |
          Rscript - <<'RSCRIPT'
          options(repos = c(CRAN = "https://cloud.r-project.org"))
          Sys.setenv(USE_BUNDLED_LIBUV = "1")

          packages <- c(
            "fs",
            "sass",
            "bslib",
            "rmarkdown",
            "blastula",
            "readr",
            "rvest",
            "xml2",
            "httr2",
            "stringr",
            "dplyr",
            "tibble",
            "purrr",
            "openssl",
            "curl",
            "jsonlite",
            "glue",
            "cli"
          )

          missing <- packages[!vapply(packages, requireNamespace, logical(1), quietly = TRUE)]

          if (length(missing) > 0) {
            cat("Installing missing R packages:", paste(missing, collapse = ", "), "\n")
            install.packages(missing, dependencies = TRUE, Ncpus = 2)
          }

          failed <- packages[!vapply(packages, requireNamespace, logical(1), quietly = TRUE)]

          if (length(failed) > 0) {
            stop("Missing packages after installation: ", paste(failed, collapse = ", "))
          }

          cat("All required R packages are available.\n")
          RSCRIPT

      - name: Run SitRep monitor
        run: |
          Rscript - <<'RSCRIPT'
          Sys.setenv(USE_BUNDLED_LIBUV = "1")

          cat("R library paths:\n")
          print(.libPaths())

          cat("USE_BUNDLED_LIBUV =", Sys.getenv("USE_BUNDLED_LIBUV"), "\n")

          source("scripts/08_cloud_sitrep_monitor.R")
          RSCRIPT

      - name: Commit monitor state if updated
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/monitor_state/preis_sitrep_email_state.csv || true
          git add data/pdf/ || true

          if git diff --cached --quiet; then
            echo "No state change to commit."
          else
            git commit -m "Update PREIS SitRep monitor state [skip ci]"
            git pull --rebase origin "${GITHUB_REF_NAME}" || true
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
